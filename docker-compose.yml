version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: artkezai_postgres
    environment:
      POSTGRES_DB: artkezai
      POSTGRES_USER: artkezai_user
      POSTGRES_PASSWORD: artkezai_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artkezai_user -d artkezai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (Local S3) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: artkezai_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web Console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO bucket setup (runs once) ───────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: artkezai_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/artkezai-paintings;
        mc anonymous set download local/artkezai-paintings;
        echo 'MinIO bucket ready.';
      "

  # ─── MailHog (Local SMTP) ─────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: artkezai_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ─── Redis (optional caching) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: artkezai_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  miniodata:
  redisdata:
