spring:
  application:
    name: artkezai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/artkezai}
    username: ${DB_USER:artkezai_user}
    password: ${DB_PASS:artkezai_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

# ── JWT ──────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:artkezai-local-dev-secret-key-must-be-at-least-256-bits-long!!}
  expiration-ms: 86400000 # 24 hours
  refresh-expiration-ms: 604800000 # 7 days

# ── MinIO ────────────────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket: ${MINIO_BUCKET:artkezai-paintings}
  public-base-url: ${MINIO_PUBLIC_URL:http://localhost:9000/artkezai-paintings}

# ── Stripe ───────────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_REPLACE_WITH_YOUR_TEST_KEY}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_REPLACE_WITH_YOUR_PUBLISHABLE_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_REPLACE_WITH_YOUR_WEBHOOK_SECRET}
  currency: usd

# ── App ──────────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  mail-from: ${MAIL_FROM:noreply@artkezai.com}
  mail-from-name: Artkezai Gallery

# ── Logging ──────────────────────────────────────────────
logging:
  level:
    com.artkezai: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss} [%highlight(%-5level)] %cyan(%logger{30}) - %msg%n"
